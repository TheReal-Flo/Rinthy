workflows:
  ios-unsigned-ipa:
    name: iOS unsigned IPA for sideloading
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: v22.11.0
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios@^6
      - name: Build web app
        script: |
          npm run build
      - name: Add and sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Configure iOS app metadata
        script: |
          PLIST="ios/App/App/Info.plist"
          PLIST_BUDDY="/usr/libexec/PlistBuddy"

          $PLIST_BUDDY -c "Delete :CFBundleURLTypes" "$PLIST" 2>/dev/null || true
          $PLIST_BUDDY -c "Add :CFBundleURLTypes array" "$PLIST"
          $PLIST_BUDDY -c "Add :CFBundleURLTypes:0 dict" "$PLIST"
          $PLIST_BUDDY -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.rinthy.mobile" "$PLIST"
          $PLIST_BUDDY -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST"
          $PLIST_BUDDY -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string rinthy" "$PLIST"

          ICON_SOURCE="public/logo.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          rm -rf "$ICON_DIR"
          mkdir -p "$ICON_DIR"

          make_icon() {
            local size="$1"
            local name="$2"
            sips -z "$size" "$size" "$ICON_SOURCE" --out "$ICON_DIR/$name" >/dev/null
          }

          make_icon 40 "AppIcon-20@2x.png"
          make_icon 60 "AppIcon-20@3x.png"
          make_icon 58 "AppIcon-29@2x.png"
          make_icon 87 "AppIcon-29@3x.png"
          make_icon 80 "AppIcon-40@2x.png"
          make_icon 120 "AppIcon-40@3x.png"
          make_icon 120 "AppIcon-60@2x.png"
          make_icon 180 "AppIcon-60@3x.png"
          make_icon 1024 "AppIcon-1024.png"

          cat > "$ICON_DIR/Contents.json" <<'JSON'
          {
            "images": [
              { "idiom": "iphone", "size": "20x20", "scale": "2x", "filename": "AppIcon-20@2x.png" },
              { "idiom": "iphone", "size": "20x20", "scale": "3x", "filename": "AppIcon-20@3x.png" },
              { "idiom": "iphone", "size": "29x29", "scale": "2x", "filename": "AppIcon-29@2x.png" },
              { "idiom": "iphone", "size": "29x29", "scale": "3x", "filename": "AppIcon-29@3x.png" },
              { "idiom": "iphone", "size": "40x40", "scale": "2x", "filename": "AppIcon-40@2x.png" },
              { "idiom": "iphone", "size": "40x40", "scale": "3x", "filename": "AppIcon-40@3x.png" },
              { "idiom": "iphone", "size": "60x60", "scale": "2x", "filename": "AppIcon-60@2x.png" },
              { "idiom": "iphone", "size": "60x60", "scale": "3x", "filename": "AppIcon-60@3x.png" },
              { "idiom": "ios-marketing", "size": "1024x1024", "scale": "1x", "filename": "AppIcon-1024.png" }
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          JSON
      - name: Build unsigned iOS app
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$CM_BUILD_DIR/build/ios/DerivedData" \
            CODE_SIGNING_ALLOWED=NO
      - name: Package unsigned IPA
        script: |
          APP_PATH=$(find "$CM_BUILD_DIR/build/ios/DerivedData/Build/Products/Release-iphoneos" -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            exit 1
          fi

          mkdir -p "$CM_BUILD_DIR/build/ipa/Payload"
          cp -R "$APP_PATH" "$CM_BUILD_DIR/build/ipa/Payload/"
          cd "$CM_BUILD_DIR/build/ipa"
          zip -r Rinthy-unsigned.ipa Payload
    artifacts:
      - build/ipa/*.ipa
      - build/ios/DerivedData/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
